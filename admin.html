<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — KF Calendar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d14;color:#e0e0f0;min-height:100vh;display:flex;flex-direction:column}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#13131f;border-bottom:1px solid #22223a;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700;color:#c4a0f0}
.topbar-r{display:flex;align-items:center;gap:16px;font-size:12px;color:#666}
/* tabs */
.tabs{display:flex;background:#13131f;border-bottom:1px solid #22223a;flex-shrink:0;overflow-x:auto}
.tab{padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab.on{color:#c4a0f0;border-bottom-color:#c4a0f0}
.tab:hover:not(.on){color:#aaa}
.badge-count{display:inline-block;background:#e06030;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;font-weight:700}
/* container */
.content{flex:1;overflow-y:auto;padding:20px 24px;max-width:1100px;width:100%;margin:0 auto}
/* calendar */
.cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:#1e1e30;border:1px solid #2a2a40;color:#ccc;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
.cal-nav button:hover{background:#2a2a40}
.cal-month-label{font-size:16px;font-weight:700;color:#e0e0f0;min-width:140px;text-align:center}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.fchip{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.fchip.all{border-color:#555;color:#aaa}
.fchip.all.on{background:#555;color:#fff}
.fchip.bts{border-color:#9040d0;color:#c080f0}
.fchip.bts.on{background:#9040d0;color:#fff}
.fchip.enhypen{border-color:#d07030;color:#f0a060}
.fchip.enhypen.on{background:#d07030;color:#fff}
.fchip.seventeen{border-color:#6050c0;color:#a090e0}
.fchip.seventeen.on{background:#6050c0;color:#fff}
.fchip.crawl{border-color:#306090;color:#70a0d0}
.fchip.crawl.on{background:#306090;color:#fff}
.fchip.manual{border-color:#306050;color:#60d090}
.fchip.manual.on{background:#306050;color:#fff}
.fchip.fan{border-color:#805020;color:#f0a040}
.fchip.fan.on{background:#805020;color:#fff}
/* cal grid */
.cal-grid-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#22223a;border-radius:10px;overflow:hidden;min-width:560px}
.cal-dow{background:#13131f;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:#666;letter-spacing:.05em}
.cal-cell{background:#1a1a28;min-height:90px;padding:6px 4px 4px;cursor:default;transition:background .1s;position:relative}
.cal-cell.other{background:#14141f}
.cal-cell.today{background:#1e1a30}
.cal-cell:hover{background:#202030}
.cal-num{font-size:11px;font-weight:700;color:#555;margin-bottom:4px}
.cal-cell.today .cal-num{color:#c4a0f0;background:#3a2060;border-radius:10px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-pill{border-radius:4px;padding:2px 5px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;display:block}
.cal-pill:hover{filter:brightness(1.2)}
.cal-more{font-size:10px;color:#666;padding:1px 4px;cursor:pointer}
.cal-more:hover{color:#aaa}
/* source colors */
.src-crawl{background:#1a3050;color:#70a0d0}
.src-manual{background:#1a3028;color:#60d090}
.src-fan{background:#3a2810;color:#f0a040}
/* event detail panel */
.detail-panel{background:#1a1a28;border:1px solid #2a2a40;border-radius:10px;padding:18px;margin-bottom:16px;display:none}
.detail-panel.open{display:block}
.detail-title{font-size:15px;font-weight:700;margin-bottom:8px}
.detail-meta{font-size:12px;color:#888;line-height:1.8;margin-bottom:14px}
.detail-actions{display:flex;gap:8px}
/* list cards */
.card{background:#1a1a28;border:1px solid #22223a;border-radius:10px;padding:16px;margin-bottom:10px}
.card-row{display:flex;align-items:flex-start;gap:12px;justify-content:space-between}
.card-info{flex:1;min-width:0}
.card-badges{margin-bottom:6px;display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-bts{background:#3a1060;color:#d090f0}
.badge-enhypen{background:#402010;color:#f0a060}
.badge-seventeen{background:#20184a;color:#a090e0}
.badge-crawl{background:#1a3050;color:#70a0d0}
.badge-manual{background:#1a3028;color:#60d090}
.badge-fan{background:#3a2810;color:#f0a040}
.badge-type{background:#222233;color:#999}
.badge-pending{background:#3a2800;color:#f0a040}
.badge-approved{background:#0a2818;color:#50c080}
.badge-rejected{background:#2a0a0a;color:#d06060}
.card-name{font-size:14px;font-weight:700;margin-bottom:4px;color:#e0e0f0;word-break:break-word}
.card-meta{font-size:12px;color:#777;line-height:1.6}
.card-meta a{color:#6080c0}
.card-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;align-items:flex-start}
/* buttons */
button{border:none;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:filter .15s}
button:hover{filter:brightness(1.15)}
.btn-approve{background:#1a4a2a;color:#60d090}
.btn-reject{background:#4a1a1a;color:#d06060}
.btn-edit{background:#2a2a4a;color:#a0a0d0}
.btn-delete{background:#3a1a1a;color:#c06060}
.btn-primary{background:#3a2060;color:#c4a0f0;padding:9px 18px;font-size:13px}
.btn-sm{padding:5px 10px;font-size:11px}
.empty{text-align:center;color:#444;padding:48px;font-size:14px}
/* form */
.form-card{background:#1a1a28;border:1px solid #22223a;border-radius:10px;padding:20px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-full{grid-column:1/-1}
label{font-size:11px;color:#777;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:9px 11px;background:#0d0d14;border:1px solid #2a2a40;border-radius:7px;color:#e0e0f0;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#6040a0}
select option{background:#0d0d14}
/* edit inline */
.edit-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.edit-row label{min-width:70px;margin:0;font-size:11px;color:#666}
.edit-row input,.edit-row select{flex:1;padding:6px 9px;font-size:12px}
/* section header */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-hdr h2{font-size:14px;font-weight:700;color:#c4a0f0}
/* feedback */
.stars{color:#f0b040;font-size:16px;letter-spacing:2px}
/* filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar select{width:auto;padding:6px 10px;font-size:12px}
</style>
</head>
<body>

<div class="topbar">
  <h1>KF Calendar — Admin</h1>
  <div class="topbar-r">
    <span id="topbar-stats">Loading…</span>
  </div>
</div>

<div class="tabs">
  <div class="tab on"  onclick="showTab('calendar')">📅 Calendar</div>
  <div class="tab"     onclick="showTab('submissions')">Fan Submissions <span id="pending-cnt" class="badge-count" style="display:none"></span></div>
  <div class="tab"     onclick="showTab('history')">Review History</div>
  <div class="tab"     onclick="showTab('feedback')">Feedback</div>
  <div class="tab"     onclick="showTab('add')">+ Add Event</div>
</div>

<div class="content">

  <!-- ═══════════════ CALENDAR TAB ═══════════════ -->
  <div id="tab-calendar">
    <div class="cal-toolbar">
      <div class="cal-nav">
        <button onclick="calMove(-1)">‹</button>
        <div class="cal-month-label" id="cal-label"></div>
        <button onclick="calMove(1)">›</button>
      </div>
      <div class="filter-chips">
        <div class="fchip all on"      onclick="toggleFilter('group','all')">All Groups</div>
        <div class="fchip bts"         onclick="toggleFilter('group','bts')">BTS</div>
        <div class="fchip enhypen"     onclick="toggleFilter('group','enhypen')">ENHYPEN</div>
        <div class="fchip seventeen"   onclick="toggleFilter('group','seventeen')">SEVENTEEN</div>
        <div style="width:1px;background:#333;margin:0 4px"></div>
        <div class="fchip crawl on"    onclick="toggleFilter('src','crawl')">Crawled</div>
        <div class="fchip manual on"   onclick="toggleFilter('src','manual')">Manual</div>
        <div class="fchip fan on"      onclick="toggleFilter('src','fan')">Fan-approved</div>
      </div>
    </div>

    <!-- event detail panel (click pill to open) -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-title" id="dp-name"></div>
      <div class="detail-meta" id="dp-meta"></div>
      <!-- inline edit form -->
      <div id="dp-edit" style="display:none;margin-bottom:14px">
        <div class="edit-row"><label>Name</label><input id="ep-name"></div>
        <div class="edit-row"><label>Venue</label><input id="ep-venue"></div>
        <div class="edit-row"><label>Date</label><input id="ep-date" type="date"></div>
        <div class="edit-row"><label>Type</label>
          <select id="ep-type">
            <option value="comeback">Comeback</option><option value="concert">Concert</option>
            <option value="tour">Tour</option><option value="fansign">Fan Sign</option>
            <option value="fancon">Fan Con</option><option value="release">Release</option>
            <option value="special">Special</option>
          </select>
        </div>
      </div>
      <div class="detail-actions" id="dp-actions"></div>
    </div>

    <div class="cal-grid-wrap">
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- ═══════════════ SUBMISSIONS TAB ═══════════════ -->
  <div id="tab-submissions" style="display:none">
    <div class="sec-hdr">
      <h2>Pending Fan Submissions</h2>
    </div>
    <div id="sub-list"><div class="empty">Loading…</div></div>
  </div>

  <!-- ═══════════════ HISTORY TAB ═══════════════ -->
  <div id="tab-history" style="display:none">
    <div class="sec-hdr"><h2>Review History</h2></div>
    <div class="filter-bar">
      <select id="hist-filter" onchange="loadHistory()">
        <option value="all">All</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div id="hist-list"><div class="empty">Loading…</div></div>
  </div>

  <!-- ═══════════════ FEEDBACK TAB ═══════════════ -->
  <div id="tab-feedback" style="display:none">
    <div class="sec-hdr"><h2>User Feedback</h2></div>
    <div id="fb-summary" style="margin-bottom:16px;font-size:13px;color:#888"></div>
    <div id="fb-list"><div class="empty">Loading…</div></div>
  </div>

  <!-- ═══════════════ ADD EVENT TAB ═══════════════ -->
  <div id="tab-add" style="display:none">
    <div class="sec-hdr"><h2>Add Event Manually</h2></div>
    <div class="form-card">
      <div class="form-grid">
        <div><label>Group</label>
          <select id="a-group">
            <option value="bts">BTS</option>
            <option value="enhypen">ENHYPEN</option>
            <option value="seventeen">SEVENTEEN</option>
          </select>
        </div>
        <div><label>Type</label>
          <select id="a-type">
            <option value="comeback">Comeback</option><option value="concert">Concert</option>
            <option value="tour">Tour</option><option value="fansign">Fan Sign</option>
            <option value="fancon">Fan Con</option><option value="release">Release</option>
            <option value="special">Special</option>
          </select>
        </div>
        <div class="form-full"><label>Event Name</label><input id="a-name" placeholder="e.g. ARIRANG World Tour — Seoul Night 1"></div>
        <div class="form-full"><label>Venue</label><input id="a-venue" placeholder="e.g. Goyang Stadium, South Korea"></div>
        <div><label>Date Start</label><input id="a-date-start" type="date"></div>
        <div><label>Date End (optional)</label><input id="a-date-end" type="date"></div>
        <div class="form-full"><label>Source URL (optional)</label><input id="a-url" placeholder="https://…"></div>
      </div>
      <button class="btn-primary" style="width:100%" onclick="addEvent()">Add Event</button>
      <div id="a-msg" style="margin-top:10px;font-size:13px;text-align:center;min-height:18px"></div>
    </div>
  </div>

</div><!-- /content -->

<script>
const SUPA_URL = 'https://zbnronyslswwbwdiuzjg.supabase.co';
const SUPA_KEY = 'sb_publishable_Io-m0ZUsJTNky1ANkXpQ-g_JoWZrzWO';

async function api(path, opts={}) {
  const {prefer, headers: extra, ...rest} = opts;
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...rest,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      ...(prefer !== undefined ? {'Prefer': prefer} : {'Prefer':'return=representation'}),
      ...(extra||{}),
    },
  });
  return res;
}

// ── STATE ──
const TABS = ['calendar','submissions','history','feedback','add'];
let allEvents = [];
let calYear, calMonth;
let filterGroup = 'all';
let filterSrc = new Set(['crawl','manual','fan']);
let detailEvent = null;
let editingId = null;

const GC = {bts:'badge-bts',enhypen:'badge-enhypen',seventeen:'badge-seventeen'};
const SC = {crawl:'badge-crawl',manual:'badge-manual',fan:'badge-fan'};
const PC = {crawl:'src-crawl',manual:'src-manual',fan:'src-fan'};
const TYPE_EMOJI = {comeback:'🎵',concert:'🎤',tour:'🌏',fansign:'✍️',fancon:'🎉',release:'💿',special:'⭐'};

// ── TABS ──
function showTab(name) {
  TABS.forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===name ? 'block' : 'none';
    document.querySelectorAll('.tab')[TABS.indexOf(t)].classList.toggle('on', t===name);
  });
  if(name==='calendar')    renderCal();
  if(name==='submissions') loadSubmissions();
  if(name==='history')     loadHistory();
  if(name==='feedback')    loadFeedback();
}

// ── INIT ──
(async function init() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  await loadAllEvents();
  renderCal();
  updateTopbar();
  loadSubmissions(); // pre-load badge count
})();

async function loadAllEvents() {
  const res = await api('events?select=*&order=date_start.asc', {prefer:''});
  allEvents = await res.json();
}

function updateTopbar() {
  document.getElementById('topbar-stats').textContent =
    `${allEvents.length} events · ${allEvents.filter(e=>e.source==='fan').length} fan-approved`;
}

// ── CALENDAR ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function calMove(d) { calMonth += d; if(calMonth>11){calMonth=0;calYear++} if(calMonth<0){calMonth=11;calYear--} renderCal(); }

function toggleFilter(type, val) {
  if(type==='group') {
    filterGroup = val;
    document.querySelectorAll('.fchip.all,.fchip.bts,.fchip.enhypen,.fchip.seventeen').forEach(el=>{
      el.classList.toggle('on', el.classList.contains(val==='all'?'all':val));
    });
    if(val==='all') document.querySelector('.fchip.all').classList.add('on');
  } else {
    if(filterSrc.has(val)) filterSrc.delete(val); else filterSrc.add(val);
    document.querySelectorAll(`.fchip.${val}`).forEach(el=>el.classList.toggle('on', filterSrc.has(val)));
  }
  renderCal();
}

function visibleEvents() {
  return allEvents.filter(e =>
    (filterGroup==='all' || e.group_id===filterGroup) &&
    filterSrc.has(e.source||'manual')
  );
}

function renderCal() {
  document.getElementById('cal-label').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // DOW headers
  DOWS.forEach(d => {
    const el = document.createElement('div');
    el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });

  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInM  = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  const cells = [];
  for(let i=firstDow-1;i>=0;i--) cells.push({day:daysInPrev-i,mo:calMonth-1,yr:calMonth===0?calYear-1:calYear,other:true});
  for(let d=1;d<=daysInM;d++) cells.push({day:d,mo:calMonth,yr:calYear,other:false});
  while(cells.length<42) { const l=cells[cells.length-1]; cells.push({day:l.day+1-(l.other&&l.mo>calMonth?0:0),mo:calMonth+1,yr:calMonth===11?calYear+1:calYear,other:true}); }
  // fix overflow days
  let od=1;
  cells.forEach((c,i)=>{ if(i>=firstDow+daysInM){ c.day=od++;c.other=true; }});

  const evts = visibleEvents();

  cells.forEach(c => {
    const dateStr = `${c.yr}-${String(c.mo+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const cellDate = new Date(c.yr, c.mo, c.day);
    const isToday  = cellDate.getTime()===today.getTime();
    const dayEvts  = evts.filter(e => e.date_start===dateStr);

    const cell = document.createElement('div');
    cell.className = ['cal-cell', c.other?'other':'', isToday?'today':''].filter(Boolean).join(' ');

    const num = document.createElement('div');
    num.className = 'cal-num';
    if(isToday) { const wrap=document.createElement('div');wrap.textContent=c.day;cell.appendChild(Object.assign(num,{}));num.appendChild(wrap); }
    else num.textContent = c.day;
    cell.appendChild(num);

    const show = dayEvts.slice(0,3);
    show.forEach(e => {
      const pill = document.createElement('div');
      pill.className = `cal-pill ${PC[e.source]||'src-manual'}`;
      pill.textContent = `${TYPE_EMOJI[e.type]||''} ${e.name}`;
      pill.title = e.name;
      pill.onclick = () => openDetail(e);
      cell.appendChild(pill);
    });
    if(dayEvts.length>3) {
      const more = document.createElement('div');
      more.className='cal-more';
      more.textContent=`+${dayEvts.length-3} more`;
      more.onclick = () => openDetail(dayEvts[3]);
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  });
}

// ── DETAIL PANEL ──
function openDetail(e) {
  detailEvent = e; editingId = null;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  document.getElementById('dp-edit').style.display='none';
  document.getElementById('dp-name').textContent = e.name;
  document.getElementById('dp-meta').innerHTML = `
    <span class="badge ${GC[e.group_id]||'badge-type'}">${(e.group_id||'').toUpperCase()}</span>
    <span class="badge ${SC[e.source]||'badge-type'}">${e.source||'manual'}</span>
    <span class="badge badge-type">${e.type}</span><br>
    📅 ${e.date_start}${e.date_end?' → '+e.date_end:''} &nbsp; 📍 ${e.venue||'—'}
    ${e.source_url?`<br>🔗 <a href="${e.source_url}" target="_blank">${e.source_url.slice(0,60)}</a>`:''}
  `;
  const actions = document.getElementById('dp-actions');
  actions.innerHTML='';
  const btnEdit = document.createElement('button');
  btnEdit.className='btn-edit'; btnEdit.textContent='Edit';
  btnEdit.onclick = () => toggleEditForm(e);
  const btnDel = document.createElement('button');
  btnDel.className='btn-delete'; btnDel.textContent='Delete';
  btnDel.onclick = () => deleteEvent(e.id);
  const btnClose = document.createElement('button');
  btnClose.className='btn-sm'; btnClose.style.background='#222'; btnClose.style.color='#888';
  btnClose.textContent='Close'; btnClose.onclick = () => panel.classList.remove('open');
  actions.append(btnEdit, btnDel, btnClose);
}

function toggleEditForm(e) {
  const editDiv = document.getElementById('dp-edit');
  if(editDiv.style.display==='block') { editDiv.style.display='none'; return; }
  document.getElementById('ep-name').value  = e.name;
  document.getElementById('ep-venue').value = e.venue||'';
  document.getElementById('ep-date').value  = e.date_start;
  document.getElementById('ep-type').value  = e.type;
  editDiv.style.display='block';
  editingId = e.id;
  // add save button if not present
  const actions = document.getElementById('dp-actions');
  if(!document.getElementById('btn-save-edit')) {
    const btn = document.createElement('button');
    btn.id='btn-save-edit'; btn.className='btn-approve'; btn.textContent='Save';
    btn.onclick = saveEdit;
    actions.prepend(btn);
  }
}

async function saveEdit() {
  if(!editingId) return;
  const body = {
    name:       document.getElementById('ep-name').value.trim(),
    venue:      document.getElementById('ep-venue').value.trim(),
    date_start: document.getElementById('ep-date').value,
    type:       document.getElementById('ep-type').value,
  };
  await api(`events?id=eq.${editingId}`, {method:'PATCH', prefer:'return=minimal', body:JSON.stringify(body)});
  await loadAllEvents();
  renderCal();
  document.getElementById('detail-panel').classList.remove('open');
}

async function deleteEvent(id) {
  if(!confirm('Delete this event?')) return;
  await api(`events?id=eq.${id}`, {method:'DELETE', prefer:'return=minimal'});
  await loadAllEvents();
  renderCal();
  document.getElementById('detail-panel').classList.remove('open');
  updateTopbar();
}

// ── SUBMISSIONS ──
async function loadSubmissions() {
  const el = document.getElementById('sub-list');
  if(el) el.innerHTML='<div class="empty">Loading…</div>';
  const res = await api('event_submissions?select=*&status=eq.pending&order=created_at.desc', {prefer:''});
  const rows = await res.json();

  // 1년 지난 것 자동 만료 처리 (클라이언트 필터)
  const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
  const active = rows.filter(r => new Date(r.created_at) > cutoff);

  const cnt = document.getElementById('pending-cnt');
  if(cnt) { cnt.textContent=active.length; cnt.style.display=active.length?'inline-block':'none'; }

  if(!el) return;
  if(!active.length){ el.innerHTML='<div class="empty">No pending submissions.</div>'; return; }
  el.innerHTML='';
  active.forEach(r => el.appendChild(makeSubCard(r, true)));
}

function makeSubCard(r, showActions) {
  const card = document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="card-row">
      <div class="card-info">
        <div class="card-badges">
          <span class="badge ${GC[r.group_id]||'badge-type'}">${(r.group_id||'').toUpperCase()}</span>
          <span class="badge badge-type">${r.type}</span>
          <span class="badge badge-${r.status}">${r.status.toUpperCase()}</span>
        </div>
        <div class="card-name">${r.name}</div>
        <div class="card-meta">
          📅 ${r.date_start}${r.date_end?' → '+r.date_end:''} &nbsp; 📍 ${r.venue||'—'}<br>
          👤 ${r.submitted_by||'anonymous'} · ${new Date(r.created_at).toLocaleDateString()}<br>
          ${r.evidence_url?`🔗 <a href="${r.evidence_url}" target="_blank">${r.evidence_url.slice(0,50)}…</a>`:'' }
          ${r.reject_reason?`<br>❌ ${r.reject_reason}`:''}
        </div>
      </div>
      ${showActions ? `
      <div class="card-actions">
        <button class="btn-approve btn-sm" onclick="approveSubmission('${r.id}',this)">✓ Approve</button>
        <button class="btn-reject btn-sm"  onclick="rejectSubmission('${r.id}',this)">✕ Reject</button>
      </div>` : ''}
    </div>
  `;
  return card;
}

async function approveSubmission(id, btn) {
  btn.disabled=true; btn.textContent='…';
  const res = await api(`event_submissions?id=eq.${id}`, {prefer:'return=representation'});
  const [row] = await res.json();
  // insert into events
  await api('events', {method:'POST', prefer:'return=minimal', body:JSON.stringify({
    group_id:row.group_id, type:row.type, name:row.name, venue:row.venue||'',
    date_start:row.date_start, date_end:row.date_end||null, source:'fan', source_url:row.evidence_url||'',
  })});
  await api(`event_submissions?id=eq.${id}`, {method:'PATCH', prefer:'return=minimal',
    body:JSON.stringify({status:'approved', reviewed_at:new Date().toISOString()})});
  await loadAllEvents();
  loadSubmissions();
  updateTopbar();
}

async function rejectSubmission(id, btn) {
  const reason = prompt('Rejection reason (optional):') ?? '';
  btn.disabled=true;
  await api(`event_submissions?id=eq.${id}`, {method:'PATCH', prefer:'return=minimal',
    body:JSON.stringify({status:'rejected', reject_reason:reason, reviewed_at:new Date().toISOString()})});
  loadSubmissions();
}

// ── HISTORY ──
async function loadHistory() {
  const el = document.getElementById('hist-list');
  el.innerHTML='<div class="empty">Loading…</div>';
  const status = document.getElementById('hist-filter').value;
  const q = status==='all'
    ? 'event_submissions?select=*&status=neq.pending&order=reviewed_at.desc'
    : `event_submissions?select=*&status=eq.${status}&order=reviewed_at.desc`;
  const res = await api(q, {prefer:''});
  const rows = await res.json();
  // 1년 필터
  const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
  const active = rows.filter(r => new Date(r.created_at) > cutoff);
  if(!active.length){ el.innerHTML='<div class="empty">No records.</div>'; return; }
  el.innerHTML='';
  active.forEach(r => el.appendChild(makeSubCard(r, false)));
}

// ── FEEDBACK ──
async function loadFeedback() {
  const el = document.getElementById('fb-list');
  el.innerHTML='<div class="empty">Loading…</div>';
  const res = await api('feedbacks?select=*&order=created_at.desc', {prefer:''});
  const rows = await res.json();
  if(!rows.length){ el.innerHTML='<div class="empty">No feedback yet.</div>'; return; }

  // summary
  const avg = (rows.reduce((s,r)=>s+(r.rating||0),0)/rows.length).toFixed(1);
  const dist = [1,2,3,4,5].map(n=>rows.filter(r=>r.rating===n).length);
  document.getElementById('fb-summary').innerHTML =
    `<strong style="font-size:22px;color:#f0b040">${avg}</strong> / 5 &nbsp; (${rows.length} responses) &nbsp;
     ${[5,4,3,2,1].map(n=>`★${n}: ${dist[n-1]}`).join(' · ')}`;

  // 1년 필터
  const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
  el.innerHTML='';
  rows.filter(r=>new Date(r.created_at)>cutoff).forEach(r => {
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-row">
        <div class="card-info">
          <div class="stars">${'★'.repeat(r.rating||0)}${'☆'.repeat(5-(r.rating||0))}</div>
          <div style="margin-top:6px;font-size:13px;color:#ccc;white-space:pre-wrap">${r.message||'<em style="color:#555">No message</em>'}</div>
          <div class="card-meta" style="margin-top:6px">${new Date(r.created_at).toLocaleString()}</div>
        </div>
      </div>
    `;
    el.appendChild(card);
  });
}

// ── ADD EVENT ──
async function addEvent() {
  const group=document.getElementById('a-group').value;
  const type=document.getElementById('a-type').value;
  const name=document.getElementById('a-name').value.trim();
  const venue=document.getElementById('a-venue').value.trim();
  const ds=document.getElementById('a-date-start').value;
  const de=document.getElementById('a-date-end').value||null;
  const url=document.getElementById('a-url').value.trim();
  const msg=document.getElementById('a-msg');
  if(!name||!ds){msg.style.color='#d06060';msg.textContent='Name and date required.';return;}
  msg.style.color='#888';msg.textContent='Saving…';
  const res=await api('events',{method:'POST',prefer:'return=minimal',
    body:JSON.stringify({group_id:group,type,name,venue,date_start:ds,date_end:de,source:'manual',source_url:url})});
  if(res.ok||res.status===201){
    msg.style.color='#60d090';msg.textContent='✓ Event added!';
    ['a-name','a-venue','a-date-start','a-date-end','a-url'].forEach(id=>document.getElementById(id).value='');
    await loadAllEvents(); updateTopbar();
  } else { msg.style.color='#d06060';msg.textContent='Error: '+(await res.text()); }
}
</script>
